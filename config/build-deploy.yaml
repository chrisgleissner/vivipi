project:
  name: vivipi

device:
  board: pico2w
  micropython_port: auto
  micropython:
    version: 1.25.0
    download_page: https://micropython.org/download/RPI_PICO2_W/
  buttons:
    a: GP15
    b: GP17
  display:
    type: waveshare-pico-oled-1.3
    mode: standard
    columns: 1
    column_separator: " "
    page_interval: 15s
    boot_logo_duration: 2s
    liveness:
      contrast_breathing:
        enabled: false
        period_s: 30
        amplitude: 16
      per_row_micro:
        enabled: false
        period_s: 15
        stagger: true
      bottom_heartbeat:
        enabled: true
        period_s: 1
        pixel_count: 1
        position: left

wifi:
  ssid: ${VIVIPI_WIFI_SSID}
  password: ${VIVIPI_WIFI_PASSWORD}

service:
  base_url: ${VIVIPI_SERVICE_BASE_URL}
  default_prefix: adb
  syslog:
    port: 514

check_state:
  failures_to_degraded: 1
  failures_to_failed: 2
  successes_to_recover: 1
  visible_degraded: false

probe_schedule:
  allow_concurrent_hosts: false
  allow_concurrent_same_host: false
  same_host_backoff_ms: 500
  interval_grace_ms: 1000

checks_config: checks.yaml
