checks:
  - name: Router
    type: ping
    target: 192.168.1.1
    interval_s: 15
    timeout_s: 10

  - name: NAS API
    type: rest
    target: https://nas.example.local/health
    method: GET
    interval_s: 15
    timeout_s: 10

  - name: Android Devices
    type: service
    target: http://127.0.0.1:8080/checks
    prefix: adb
    interval_s: 15
    timeout_s: 10
