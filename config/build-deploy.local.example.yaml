project:
  name: vivipi

device:
  board: pico2w
  micropython_port: auto
  micropython:
    version: 1.25.0
    download_page: https://micropython.org/download/RPI_PICO2_W/
  buttons:
    a: GP15
    b: GP17
  # Optional advanced form:
  # buttons:
  #   a: { pin: GP15, pull: auto }
  #   b: { pin: GP17, pull: auto }
  # Optional startup confirmation overlay on boot for hardware validation:
  # startup_self_test_s: 30
  display:
    type: waveshare-pico-oled-1.3
    # Advanced override only. The Waveshare Pico OLED 1.3 infers SH1107 column_offset: 32.
    # column_offset: 32
    mode: standard
    columns: 1
    column_separator: " "
    page_interval: 20s
    liveness:
      contrast_breathing:
        enabled: false
        period_s: 30
        amplitude: 16
      per_row_micro:
        enabled: false
        period_s: 15
        stagger: true
      bottom_heartbeat:
        enabled: true
        period_s: 1
        pixel_count: 1
        position: left

wifi:
  ssid: YourWifiName
  password: YourWifiPassword

service:
  # Leave base_url commented out if you do not want SERVICE checks in config.json.
  # base_url: http://192.168.1.10:8080/checks
  default_prefix: adb
  # When base_url is set, syslog defaults to the same host on UDP 514.
  # syslog:
  #   host: 192.168.1.10
  #   port: 514

check_state:
  failures_to_degraded: 1
  failures_to_failed: 2
  successes_to_recover: 1
  visible_degraded: false

probe_schedule:
  allow_concurrent_hosts: false
  allow_concurrent_same_host: false
  same_host_backoff_ms: 500
  interval_grace_ms: 1000

checks_config: checks.yaml
