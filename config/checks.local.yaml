checks:
  - name: C64U PING
    type: ping
    target: 192.168.1.167
    interval_s: 10
    timeout_s: 8

  - name: C64U IDENT
    type: ident
    target: ident://192.168.1.167:64
    interval_s: 10
    timeout_s: 8

  - name: C64U DMA
    type: dma
    target: dma://192.168.1.167:64
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: C64U REST
    type: http
    target: http://192.168.1.167/v1/version
    method: GET
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: C64U FTP
    type: ftp
    target: 192.168.1.167
    username: ${VIVIPI_NETWORK_USERNAME}
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: C64U TELNET
    type: telnet
    target: 192.168.1.167:23
    username: ${VIVIPI_NETWORK_USERNAME}
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: PIXEL4 ADB
    type: http
    target: http://mickey:8081/vivipi/probe/adb/9B081FFAZ001WX
    method: GET
    interval_s: 10
    timeout_s: 8

  - name: U64 PING
    type: ping
    target: 192.168.1.13
    interval_s: 10
    timeout_s: 8

  - name: U64 IDENT
    type: ident
    target: ident://192.168.1.13:64
    interval_s: 10
    timeout_s: 8

  - name: U64 DMA
    type: dma
    target: dma://192.168.1.13:64
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: U64 REST
    type: http
    target: http://192.168.1.13/v1/version
    method: GET
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: U64 FTP
    type: ftp
    target: 192.168.1.13
    username: ${VIVIPI_NETWORK_USERNAME}
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: U64 TELNET
    type: telnet
    target: 192.168.1.13:23
    username: ${VIVIPI_NETWORK_USERNAME}
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8
