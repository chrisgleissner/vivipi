# Local targets should use host aliases from build-deploy.local.yaml so IP changes
# only require a single config edit before ./build deploy.
checks:
  - name: C64U REST
    type: http
    target: http://c64/v1/version
    method: GET
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: C64U FTP
    type: ftp
    target: c64
    username: ${VIVIPI_NETWORK_USERNAME}
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: C64U TELNET
    type: telnet
    target: c64:23
    username: ${VIVIPI_NETWORK_USERNAME}
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: PIXEL4 ADB
    type: http
    target: http://mickey:8081/vivipi/probe/adb/9B081FFAZ001WX
    method: GET
    interval_s: 10
    timeout_s: 8

  - name: U64 REST
    type: http
    target: http://u64/v1/version
    method: GET
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: U64 FTP
    type: ftp
    target: u64
    username: ${VIVIPI_NETWORK_USERNAME}
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8

  - name: U64 TELNET
    type: telnet
    target: u64:23
    username: ${VIVIPI_NETWORK_USERNAME}
    password: ${VIVIPI_NETWORK_PASSWORD}
    interval_s: 10
    timeout_s: 8
