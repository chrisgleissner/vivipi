name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release assets
        env:
          PYTHON_BIN: python
          VIVIPI_WIFI_SSID: release-ssid
          VIVIPI_WIFI_PASSWORD: release-password
          VIVIPI_SERVICE_BASE_URL: http://192.0.2.10:8080/checks
        run: ./build release-assets --venv .venv-release

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'legacy' }}
          files: |
            artifacts/release/pico2w-micropython-${{ github.ref_name }}.txt
            artifacts/release/vivipi-device-filesystem-${{ github.ref_name }}.zip
            artifacts/release/vivipi-service-bundle-${{ github.ref_name }}.zip
            artifacts/release/vivipi-source-${{ github.ref_name }}.zip
            artifacts/release/vivipi-source-${{ github.ref_name }}.tar.gz
